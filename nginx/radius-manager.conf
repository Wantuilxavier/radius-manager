# /etc/nginx/sites-available/radius-manager
# Proxy reverso para o Radius Manager (Node.js na porta APP_PORT)
# O install.sh substitui APP_PORT automaticamente.
# Para HTTPS, execute: certbot --nginx -d seu.dominio.com

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Logs
    access_log /var/log/nginx/radius-manager.access.log;
    error_log  /var/log/nginx/radius-manager.error.log;

    # Segurança: esconde versão do nginx
    server_tokens off;

    # Headers de segurança
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Tamanho máximo de upload (para futuras funcionalidades)
    client_max_body_size 10M;

    # Proxy para o Node.js
    location / {
        proxy_pass         http://127.0.0.1:APP_PORT;
        proxy_http_version 1.1;

        proxy_set_header Upgrade     $http_upgrade;
        proxy_set_header Connection  'upgrade';
        proxy_set_header Host        $host;
        proxy_set_header X-Real-IP   $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Health check interno
    location /health {
        proxy_pass http://127.0.0.1:APP_PORT/api/auth/me;
        access_log off;
    }
}
