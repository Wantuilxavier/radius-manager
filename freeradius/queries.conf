# ============================================================
# FreeRADIUS — mods-config/sql/main/mysql/queries.conf
# Customizado pelo Radius Manager
#
# Diferença em relação ao padrão:
#   • authorize_check_query e authorize_reply_query incluem
#     "DEFAULT" no WHERE para suportar a política de VLAN padrão
#     para usuários não cadastrados (feature "VLAN padrão").
#   • simul_count_query e simul_verify_query para controle de
#     conexões simultâneas por usuário (Simultaneous-Use).
#
# O install.sh copia este arquivo para:
#   /etc/freeradius/3.0/mods-config/sql/main/mysql/queries.conf
# ============================================================

# ─── Accounting ──────────────────────────────────────────────
accounting_onoff_query = "\
    UPDATE ${acct_table1} \
    SET \
        acctstoptime = FROM_UNIXTIME(%{integer:Event-Timestamp}), \
        acctsessiontime = '%{integer:Event-Timestamp}' \
            - UNIX_TIMESTAMP(acctstarttime), \
        acctterminatecause = '%{Acct-Terminate-Cause}' \
    WHERE acctstoptime IS NULL \
    AND nasipaddress   = '%{NAS-IP-Address}' \
    AND acctstarttime  <= FROM_UNIXTIME(%{integer:Event-Timestamp})"

accounting_start_query = "\
    INSERT INTO ${acct_table1} \
        (acctsessionid, acctuniqueid, username, \
        realm, nasipaddress, nasportid, \
        nasporttype, acctstarttime, acctupdatetime, \
        acctstoptime, acctsessiontime, acctauthentic, \
        connectinfo_start, connectinfo_stop, \
        acctinputoctets, acctoutputoctets, \
        calledstationid, callingstationid, \
        acctterminatecause, servicetype, framedprotocol, \
        framedipaddress) \
    VALUES \
        ('%{Acct-Session-Id}', '%{Acct-Unique-Session-Id}', '%{SQL-User-Name}', \
        '%{Realm}', '%{NAS-IP-Address}', '%{NAS-Port}', \
        '%{NAS-Port-Type}', FROM_UNIXTIME(%{integer:Event-Timestamp}), \
        FROM_UNIXTIME(%{integer:Event-Timestamp}), \
        NULL, '0', '%{Acct-Authentic}', \
        '%{Connect-Info}', '', \
        '0', '0', \
        '%{Called-Station-Id}', '%{Calling-Station-Id}', \
        '', '%{Service-Type}', '%{Framed-Protocol}', \
        '%{Framed-IP-Address}')"

accounting_start_query_alt = "\
    UPDATE ${acct_table1} SET \
        acctstarttime    = FROM_UNIXTIME(%{integer:Event-Timestamp}), \
        acctupdatetime   = FROM_UNIXTIME(%{integer:Event-Timestamp}), \
        connectinfo_start = '%{Connect-Info}' \
    WHERE acctsessionid  = '%{Acct-Session-Id}' \
    AND   username       = '%{SQL-User-Name}' \
    AND   nasipaddress   = '%{NAS-IP-Address}'"

accounting_update_query = "\
    UPDATE ${acct_table1} \
    SET \
        acctupdatetime  = FROM_UNIXTIME(%{integer:Event-Timestamp}), \
        acctinterval    = '%{Acct-Interval}', \
        acctsessiontime = '%{Acct-Session-Time}', \
        acctinputoctets = '%{Acct-Input-Gigawords}' * 4294967296 + '%{Acct-Input-Octets}', \
        acctoutputoctets = '%{Acct-Output-Gigawords}' * 4294967296 + '%{Acct-Output-Octets}', \
        framedipaddress = '%{Framed-IP-Address}' \
    WHERE acctsessionid = '%{Acct-Session-Id}' \
    AND   username      = '%{SQL-User-Name}' \
    AND   nasipaddress  = '%{NAS-IP-Address}' \
    AND   acctstoptime IS NULL"

accounting_stop_query = "\
    UPDATE ${acct_table1} \
    SET \
        acctstoptime     = FROM_UNIXTIME(%{integer:Event-Timestamp}), \
        acctsessiontime  = '%{Acct-Session-Time}', \
        acctinputoctets  = '%{Acct-Input-Gigawords}' * 4294967296 + '%{Acct-Input-Octets}', \
        acctoutputoctets = '%{Acct-Output-Gigawords}' * 4294967296 + '%{Acct-Output-Octets}', \
        acctterminatecause = '%{Acct-Terminate-Cause}', \
        connectinfo_stop = '%{Connect-Info}' \
    WHERE acctsessionid = '%{Acct-Session-Id}' \
    AND   username      = '%{SQL-User-Name}' \
    AND   nasipaddress  = '%{NAS-IP-Address}' \
    AND   acctstoptime IS NULL"

accounting_stop_query_alt = "\
    INSERT INTO ${acct_table1} \
        (acctsessionid, acctuniqueid, username, \
        realm, nasipaddress, nasportid, \
        nasporttype, acctstarttime, acctupdatetime, \
        acctstoptime, acctsessiontime, acctauthentic, \
        connectinfo_start, connectinfo_stop, \
        acctinputoctets, acctoutputoctets, \
        calledstationid, callingstationid, \
        acctterminatecause, servicetype, framedprotocol, \
        framedipaddress) \
    VALUES \
        ('%{Acct-Session-Id}', '%{Acct-Unique-Session-Id}', '%{SQL-User-Name}', \
        '%{Realm}', '%{NAS-IP-Address}', '%{NAS-Port}', \
        '%{NAS-Port-Type}', FROM_UNIXTIME(%{integer:Event-Timestamp} - %{integer:Acct-Session-Time}), \
        FROM_UNIXTIME(%{integer:Event-Timestamp}), \
        FROM_UNIXTIME(%{integer:Event-Timestamp}), '%{Acct-Session-Time}', '%{Acct-Authentic}', \
        '', '%{Connect-Info}', \
        '%{Acct-Input-Gigawords}' * 4294967296 + '%{Acct-Input-Octets}', \
        '%{Acct-Output-Gigawords}' * 4294967296 + '%{Acct-Output-Octets}', \
        '%{Called-Station-Id}', '%{Calling-Station-Id}', \
        '%{Acct-Terminate-Cause}', '%{Service-Type}', '%{Framed-Protocol}', \
        '%{Framed-IP-Address}')"

# ─── Autenticação — com suporte a DEFAULT ─────────────────────
# Inclui "DEFAULT" no WHERE para que usuários não cadastrados
# recebam os atributos/grupo definidos pela política de VLAN padrão.
# A ordenação "username DESC" garante que o usuário específico
# tenha prioridade sobre o DEFAULT.

authorize_check_query = "\
    SELECT id, username, attribute, value, op \
    FROM ${authcheck_table} \
    WHERE username IN ('%{SQL-User-Name}', 'DEFAULT') \
    ORDER BY username DESC, id"

authorize_reply_query = "\
    SELECT id, username, attribute, value, op \
    FROM ${authreply_table} \
    WHERE username IN ('%{SQL-User-Name}', 'DEFAULT') \
    ORDER BY username DESC, id"

authorize_group_check_query = "\
    SELECT ${groupcheck_table}.id, ${groupcheck_table}.groupname, ${groupcheck_table}.attribute, \
        ${groupcheck_table}.value, ${groupcheck_table}.op \
    FROM ${groupcheck_table}, ${usergroup_table} \
    WHERE ${usergroup_table}.username IN ('%{SQL-User-Name}', 'DEFAULT') \
    AND ${usergroup_table}.groupname = ${groupcheck_table}.groupname \
    ORDER BY ${usergroup_table}.username DESC, ${groupcheck_table}.id"

authorize_group_reply_query = "\
    SELECT ${groupreply_table}.id, ${groupreply_table}.groupname, ${groupreply_table}.attribute, \
        ${groupreply_table}.value, ${groupreply_table}.op \
    FROM ${groupreply_table}, ${usergroup_table} \
    WHERE ${usergroup_table}.username IN ('%{SQL-User-Name}', 'DEFAULT') \
    AND ${usergroup_table}.groupname = ${groupreply_table}.groupname \
    ORDER BY ${usergroup_table}.username DESC, ${groupreply_table}.id"

# ─── Grupos ────────────────────────────────────────────────────
group_membership_query = "\
    SELECT groupname \
    FROM ${usergroup_table} \
    WHERE username IN ('%{SQL-User-Name}', 'DEFAULT') \
    ORDER BY username DESC, priority"

# ─── Sessões simultâneas ───────────────────────────────────────
simul_count_query = "\
    SELECT COUNT(*) \
    FROM ${acct_table1} \
    WHERE username = '%{SQL-User-Name}' \
    AND   acctstoptime IS NULL"

simul_verify_query = "\
    SELECT radacctid, acctsessionid, username, \
           nasipaddress, nasportid, framedipaddress, \
           callingstationid, framedprotocol \
    FROM ${acct_table1} \
    WHERE username = '%{SQL-User-Name}' \
    AND   acctstoptime IS NULL"

# ─── Post-Auth ─────────────────────────────────────────────────
postauth_query = "\
    INSERT INTO ${postauth_table} \
        (username, pass, reply, authdate) \
    VALUES \
        ('%{User-Name}', '%{User-Password:-Chap-Password}', \
        '%{reply:Packet-Type}', NOW())"
