# ============================================================
# FreeRADIUS — Módulo SQL (MariaDB)
# Arquivo: /etc/freeradius/3.0/mods-available/sql
#
# O install.sh substitui SUA_SENHA_AQUI automaticamente.
# Se instalar manualmente, edite o campo "password" abaixo.
# ============================================================

sql {
    dialect = "mysql"
    driver  = "rlm_sql_mysql"

    mysql {
        tls {
            # ssl_ca   = "/etc/ssl/certs/ca-certificates.crt"
            # ssl_cert = ""
            # ssl_key  = ""
        }
        warnings = auto
    }

    server   = "localhost"
    port     = 3306
    login    = "radius"
    password = "SUA_SENHA_AQUI"

    radius_db = "radius"

    # Tabelas de autenticação
    authcheck_table  = "radcheck"
    authreply_table  = "radreply"
    groupcheck_table = "radgroupcheck"
    groupreply_table = "radgroupreply"
    usergroup_table  = "radusergroup"

    # Tabelas de accounting
    acct_table1    = "radacct"
    acct_table2    = "radacct"
    postauth_table = "radpostauth"

    read_groups  = yes
    read_clients = yes
    client_table = "nas"

    # Remove sessões abandonadas (sem Accounting-Stop) antes de checar
    # o limite de sessões simultâneas — essencial para Simultaneous-Use funcionar.
    delete_stale_sessions = yes

    pool {
        start        = ${thread[pool].start_servers}
        min          = ${thread[pool].min_spare_servers}
        max          = ${thread[pool].max_servers}
        spare        = ${thread[pool].max_spare_servers}
        uses         = 0
        retry_delay  = 30
        lifetime     = 0
        idle_timeout = 60
    }

    # ─────────────────────────────────────────────────────────────
    # Queries de controle de sessões simultâneas (Simultaneous-Use)
    #
    # O FreeRADIUS usa "simul_count" para contar as sessões abertas
    # do usuário e "simul_verify" para confirmar se estão realmente
    # ativas (consultando o NAS via SNMP/CoA, ou apenas confiando
    # no banco).  Aqui usamos verificação pelo banco (accounting).
    #
    # O atributo "Simultaneous-Use" é inserido em radcheck pelo
    # Radius Manager quando o administrador define o limite.
    # O sites-default já tem "session { sql }" que activa estas queries.
    # ─────────────────────────────────────────────────────────────

    simul_count_query = "SELECT COUNT(*) \
                         FROM ${acct_table1} \
                         WHERE username = '%{SQL-User-Name}' \
                           AND acctstoptime IS NULL"

    simul_verify_query = "SELECT radacctid, acctsessionid, username, \
                                 nasipaddress, nasportid, framedipaddress, \
                                 callingstationid, framedprotocol \
                          FROM ${acct_table1} \
                          WHERE username = '%{SQL-User-Name}' \
                            AND acctstoptime IS NULL"
}
